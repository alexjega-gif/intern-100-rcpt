<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rezepte 2026</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            --bg-grad: radial-gradient(circle at center, #1e5799 0%, #133d6b 50%, #001224 100%);
            --txt: #ffffff;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glossy: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
            --acc: #00d2ff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-grad);
            background-attachment: fixed;
            color: var(--txt);
            margin: 0;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: calc(50px + env(safe-area-inset-bottom));
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: calc(20px + env(safe-area-inset-top)) 30px 20px 30px;
            background: rgba(0, 18, 36, 0.7); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        #titel {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            flex-grow: 1;
            text-align: center;
        }

        .btn, .btn-close {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            font-weight: bold;
            min-width: 60px;
        }

        .btn-close { background: rgba(255, 50, 50, 0.2); font-size: 1.2rem; }

        .container { padding: 20px; max-width: 1100px; margin: 0 auto; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: var(--glass);
            height: 140px;
            border-radius: 12px;
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .card:active { transform: scale(0.95); border-color: var(--acc); }

        .list-item {
            background: var(--glass);
            padding: 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid var(--acc);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .detail {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px; 
            padding: 25px;
        }

        .rechner-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--acc);
        }

        .rechner-box input {
            width: 80px;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--acc);
            color: white;
            font-size: 1.4rem;
            text-align: center;
        }

        #search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
        }

        ul { list-style: none; padding: 0; }
        li { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        b { color: var(--acc); min-width: 80px; display: inline-block; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            #titel { font-size: 1.3rem; }
            header { padding: calc(15px + env(safe-area-inset-top)) 15px 15px 15px; }
        }
    </style>
</head>

        { "m": 0, "e": "n.B.", "n": { "de": "Stärke (zum Abbinden)", "en": "starch (for thickening)" } }
    ],
    "a": { 
        "de": "1. Anbraten: Den großen Schmortopf stark aufheizen. Die Hähnchenstreifen portionsweise mit etwas Öl und Brathähnchengewürz scharf anbraten. Darauf achten, dass nicht zu viel Fleisch im Topf ist, damit es nicht wässert. Fleisch herausnehmen und beiseite stellen.<br><br>2. Ansatz: Flamme ausschalten, die Zwiebelstreifen zugeben und mit Gewürz würzen. Ca. 5 Minuten warten, damit sich der Bratensatz löst.<br><br>3. Röstaromen: Flamme wieder einschalten und die Zwiebeln glasig ziehen. Tomatenmark zugeben und anrösten. 2-3 Mal mit Rotwein ablöschen, den Bodensatz abkratzen und reduzieren, bis eine kräftige Farbe entsteht.<br><br>4. Saucenbasis: Mit ca. 6 Litern Wasser auffüllen. Lorbeer, Piment, Zitronensaft und Knoblauchöl zugeben. Kräftig aufkochen.<br><br>5. Finish: Die Sauce mit Stärke gut abbinden. Vom Herd nehmen und die Sahne unterrühren. Abschmecken.<br><br>6. Bereitstellung: Die Sauce in zwei 1/1 GN-Behälter füllen und das Fleisch dazugeben. Kurz vor der Ausgabe abgedeckt im Ofen regenerieren.<br><br>Hinweis zur Lagerung: Erst nach vollständiger Abkühlung luftdicht verschließen.",
        "en": "1. Searing: Heat the large braising pot strongly. Sear the chicken strips in batches with a little oil and roast chicken seasoning. Ensure not too much meat is in the pot at once to prevent watering. Remove meat and set aside.<br><br>2. Base: Turn off the flame, add the onion strips and season with spice. Wait approx. 5 minutes for the sediment to loosen.<br><br>3. Roasting: Turn the flame back on and sauté the onions until translucent. Add tomato paste and roast. Deglaze 2-3 times with red wine, scrape the bottom, and reduce until a strong color develops.<br><br>4. Sauce base: Top up with approx. 6 liters of water. Add bay leaves, allspice, lemon juice, and garlic oil. Bring to a vigorous boil.<br><br>5. Finish: Thicken the sauce well with starch. Remove from heat and stir in the cream. Season to taste.<br><br>6. Service: Pour the sauce into two 1/1 GN containers and add the meat. Regenerate covered in the oven shortly before serving.<br><br>Storage note: Seal airtight only after cooling completely."
    }
},

    "a": { 
        "de": "1. Infusion & Kochen: Sahne, Zucker, Orangenschale, Muskat, Salz sowie Mark und Schote der Vanille aufkochen. Kurz abkühlen lassen und durch ein Haarsieb in einen Messbecher passieren. Schote abwaschen und für neuen Vanillezucker nutzen.<br><br>2. Legieren & Entschäumen: Eigelbe im großen Messbecher vorlegen. Warme Sahne mit einem feinen Schneebesen hurtig unterrühren, um Stocken zu vermeiden. Schaum mit dem Bunsenbrenner vorsichtig wegbrennen.<br><br>3. Garen im iCombi Pro: Schälchen in 1/1 GN (4 cm hoch) füllen und final abflämmen. Im Ofen (mittlere Ebene) eine Fingerbreite Wasser angießen. Bei Hitze 96°C/100% Feuchtigkeit für 45 Min. garen.<br><br>4. Finish & Kontrolle: Tür sachte schließen (Schwappgefahr!). Nach Ablauf durch Ruckeln prüfen: Die Creme muss gestockt sein. Wassereintritt ruiniert die Creme. Falls nur zu weich, 5 Min. nachstellen.",
        "en": "1. Infusion & Boiling: Boil cream, sugar, orange zest, nutmeg, salt, and vanilla seeds/pod. Let cool briefly and strain through a fine mesh sieve into a measuring cup. Wash the pod and reuse it for vanilla sugar.<br><br>2. Binding & Defoaming: Place egg yolks in a large measuring cup. Rapidly whisk in the warm cream to prevent curdling. Carefully burn off any foam with a blowtorch.<br><br>3. Cooking in iCombi Pro: Fill ramekins in a 1/1 GN tray (4 cm high) and flame one last time. Pour a finger's width of water into the tray in the oven (middle rack). Cook at 96°C/100% humidity for 45 min.<br><br>4. Finish & Quality Control: Close the door gently (risk of splashing!). After the timer, check by jiggling: the cream must be set. Any water entering will ruin it. If it is too soft, add 5 min."

// Zentrale Variablen
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
let currentLang = localStorage.getItem("lang") || "de";
let stack = ['home'];
let curP = "";

// Sprach-Helper
const t = (field) => {
    if (typeof field === 'object' && field !== null) {
        return field[currentLang] || field['de'] || "";
    }
    return field || "";
};

window.toggleLang = () => {
    currentLang = currentLang === "de" ? "en" : "de";
    localStorage.setItem("lang", currentLang);
    render(); 
};

// Suche
window.handleSearch = (query) => {
    const content = document.getElementById('home-content');
    if (!content) return;
    const q = query.toLowerCase().trim();
    
    if (q.length < 2) {
        renderHomeContent();
        return;
    }

    const filtered = rezepte.filter(r => 
        t(r.titel).toLowerCase().includes(q) || 
        r.posten.toLowerCase().includes(q)
    );

    if (filtered.length > 0) {
        content.innerHTML = `
            <div style="font-size: 0.9rem; color: var(--acc); margin: 20px 0 10px 0;">${filtered.length} TREFFER</div>
            <div class="search-list">
                ${filtered.map(r => `
                    <div class="list-item" onclick="openR('${r.id}')">
                        <small style="display:block; font-size:0.7rem; opacity:0.6;">${r.posten}</small>
                        ${t(r.titel)}
                    </div>`).join('')}
            </div>`;
    } else {
        content.innerHTML = `<div style="text-align:center; margin-top:50px; opacity:0.5;">${currentLang === 'de' ? 'Kein Rezept gefunden.' : 'No recipe found.'}</div>`;
    }
};

function renderHomeContent() {
    const content = document.getElementById('home-content');
    const pSet = [...new Set(rezepte.map(r => r.posten))].filter(p => p).sort();
    content.innerHTML = `<div class="grid">${pSet.map(p => `<div class="card" onclick="openP('${p}')">${p}</div>`).join('')}</div>`;
}

function render() {
    const app = document.getElementById('app');
    const tit = document.getElementById('titel');
    const back = document.getElementById('back');
    const closeBtn = document.getElementById('close-app');
    const view = stack[stack.length - 1];

    window.scrollTo(0, 0);
    const langBtnHtml = `<button class="btn" onclick="toggleLang()" style="margin-left:10px; min-width:40px;">${currentLang.toUpperCase()}</button>`;

    if (view === 'home') {
        tit.innerText = currentLang === 'de' ? "POSTEN" : "STATIONS";
        back.classList.add('hidden');
        if (closeBtn) isIOS ? closeBtn.classList.add('hidden') : closeBtn.classList.remove('hidden');
        
        app.innerHTML = `
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="search-input" placeholder="${currentLang === 'de' ? 'Suchen...' : 'Search...'}" oninput="handleSearch(this.value)" autocomplete="off" style="flex-grow:1;">
                ${langBtnHtml}
            </div>
            <div id="home-content"></div>`;
        renderHomeContent();
    } else {
        back.classList.remove('hidden');
        if (closeBtn) closeBtn.classList.add('hidden');
        
        if (view === 'list') {
            tit.innerText = curP.toUpperCase();
            const list = rezepte.filter(r => r.posten === curP).sort((a, b) => t(a.titel).localeCompare(t(b.titel)));
            app.innerHTML = list.map(r => `<div class="list-item" onclick="openR('${r.id}')">${t(r.titel)}</div>`).join('');
        } else {
            const r = rezepte.find(i => String(i.id) === String(view));
            if (r) {
                tit.innerText = currentLang === 'de' ? "REZEPT" : "RECIPE";
                const basisFaktor = 1;
                const rawA = t(r.a);
                const formatA = Array.isArray(rawA) ? rawA.join('<br>') : rawA.replace(/\n/g, '<br>');

                app.innerHTML = `
                    <div class="detail">
                        <h2 style="font-weight:200; font-size:2.2rem; margin:0 0 20px 0;">${t(r.titel)}</h2>
                        <div class="rechner-box">
                            <span>${currentLang === 'de' ? 'Menge anpassen:' : 'Adjust quantity:'}</span>
                            <input type="number" id="menge-input" inputmode="decimal" value="${basisFaktor}" oninput="liveUpdate('${r.id}')">
                        </div>
                        <h3>${currentLang === 'de' ? 'Zutaten' : 'Ingredients'}</h3>
                        <ul id="dynamic-z-list">${renderZutaten(r, basisFaktor)}</ul>
                        <p style="line-height:1.8; margin-top:20px;">${formatA}</p>
                    </div>`;
            }
        }
    }
}

function renderZutaten(r, faktor) {
    return r.z.map(i => {
        let wertAnzeige = (i.m === 0 || i.m === "" || String(i.m).toLowerCase().includes("n.b")) 
            ? "n.B." 
            : `${(i.m * faktor).toFixed(2).replace('.00','')} ${i.e === "g" ? "gr" : i.e}`;
        return `<li><b>${wertAnzeige}</b> <span>${t(i.n)}</span></li>`;
    }).join('');
}

window.liveUpdate = (id) => {
    const r = rezepte.find(i => String(i.id) === String(id));
    const input = document.getElementById('menge-input');
    const faktor = parseFloat(input.value) || 0;
    document.getElementById('dynamic-z-list').innerHTML = renderZutaten(r, faktor);
};

window.openP = (p) => { curP = p; stack.push('list'); render(); };
window.openR = (id) => { stack.push(String(id)); render(); };
window.goB = () => { stack.pop(); render(); };
window.exitAppSafe = () => { if (window.Capacitor) Capacitor.Plugins.App.exitApp(); };

render();
</script>
</body>
</html>
